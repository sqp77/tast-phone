<ion-card class="event-card" [class]="'event-card--' + variant" (click)="navigate()">
  <div class="event-img-wrap">
    <img [src]="event.image" [alt]="event.titleAr" class="event-img" loading="lazy" />
    <div class="event-overlay"></div>
    <button class="fav-btn" (click)="toggleFavorite($event)">
      <ion-icon [name]="isFavorite ? 'heart' : 'heart-outline'" [class.active]="isFavorite"></ion-icon>
    </button>
    <div class="date-badge">
      <span class="date-day">{{ event.startDate | date:'d' }}</span>
      <span class="date-month">{{ event.startDate | date:'MMM' }}</span>
    </div>
  </div>
  <ion-card-content class="event-body">
    <ion-chip class="cat-chip">
      <ion-label>{{ event.categoryAr }}</ion-label>
    </ion-chip>
    <h3 class="event-title">{{ event.titleAr }}</h3>
    <div class="event-meta">
      <div class="meta-row">
        <ion-icon name="location-outline"></ion-icon>
        <span>{{ event.cityNameAr }}</span>
      </div>
      <div class="meta-row">
        <ion-icon name="ticket-outline"></ion-icon>
        <span *ngIf="event.priceType === 'free'">مجاني</span>
        <span *ngIf="event.priceType === 'paid'">{{ event.price }} ر.س</span>
      </div>
    </div>
  </ion-card-content>
</ion-card>
