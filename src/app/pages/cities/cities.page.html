<ion-header class="cities-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title class="page-title">مدن المملكة</ion-title>
  </ion-toolbar>
  <ion-toolbar class="search-toolbar">
    <ion-searchbar
      placeholder="ابحث عن مدينة..."
      (ionInput)="onSearch($event)"
      animated
      class="city-search">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content class="cities-content">
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content pullingText="اسحب للتحديث" refreshingText="جاري التحديث..."></ion-refresher-content>
  </ion-refresher>

  <!-- Stats bar -->
  <div class="stats-bar" *ngIf="!isLoading">
    <div class="stat-item">
      <span class="stat-num">{{ filtered.length }}</span>
      <span class="stat-lbl">مدينة</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num">13</span>
      <span class="stat-lbl">منطقة</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-num">2030</span>
      <span class="stat-lbl">رؤية</span>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="cities-grid">
    <app-skeleton-card variant="city" [count]="4"></app-skeleton-card>
  </div>

  <!-- Grid -->
  <div *ngIf="!isLoading && filtered.length > 0" class="cities-grid">
    <app-city-card *ngFor="let city of filtered" [city]="city" variant="featured"></app-city-card>
  </div>

  <!-- Empty -->
  <app-empty-state
    *ngIf="!isLoading && filtered.length === 0"
    icon="map-outline"
    title="لا توجد مدن"
    message="جرّب البحث بكلمة مختلفة">
  </app-empty-state>

  <div class="bottom-space"></div>
</ion-content>
