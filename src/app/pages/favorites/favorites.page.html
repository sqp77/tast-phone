<ion-header>
  <ion-toolbar>
    <ion-title>المفضلة</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment [(ngModel)]="activeTab">
      <ion-segment-button value="cities">
        <ion-label>المدن ({{ favCities.length }})</ion-label>
      </ion-segment-button>
      <ion-segment-button value="attractions">
        <ion-label>المعالم ({{ favAttractions.length }})</ion-label>
      </ion-segment-button>
      <ion-segment-button value="events">
        <ion-label>الفعاليات ({{ favEvents.length }})</ion-label>
      </ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content class="fav-content">
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content></ion-refresher-content>
  </ion-refresher>

  <!-- Cities -->
  <div *ngIf="activeTab === 'cities'" class="fav-list">
    <app-city-card *ngFor="let city of favCities" [city]="city" variant="featured"></app-city-card>
    <app-empty-state
      *ngIf="favCities.length === 0"
      icon="heart-outline"
      title="لا توجد مدن مفضلة"
      message="أضف مدناً لقائمة المفضلة من صفحة المدن">
    </app-empty-state>
  </div>

  <!-- Attractions -->
  <div *ngIf="activeTab === 'attractions'" class="fav-list">
    <app-attraction-card *ngFor="let attr of favAttractions" [attraction]="attr"></app-attraction-card>
    <app-empty-state
      *ngIf="favAttractions.length === 0"
      icon="heart-outline"
      title="لا توجد معالم مفضلة"
      message="أضف معالم من صفحة الاستكشاف">
    </app-empty-state>
  </div>

  <!-- Events -->
  <div *ngIf="activeTab === 'events'" class="fav-list">
    <app-event-card *ngFor="let event of favEvents" [event]="event" variant="list"></app-event-card>
    <app-empty-state
      *ngIf="favEvents.length === 0"
      icon="heart-outline"
      title="لا توجد فعاليات مفضلة"
      message="أضف فعاليات من صفحة الفعاليات">
    </app-empty-state>
  </div>
</ion-content>
