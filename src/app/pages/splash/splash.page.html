<ion-content class="splash-content" [fullscreen]="true">
  <div class="splash-bg">
    <div class="splash-overlay"></div>
  </div>

  <div class="splash-body">
    <div class="logo-wrap animate-bounceIn">
      <div class="logo-circle">
        <span class="logo-emoji">🕌</span>
      </div>
    </div>

    <div class="brand-text animate-fadeInUp" style="animation-delay:0.3s">
      <h1 class="app-name">Saudi Explorer</h1>
      <p class="app-tagline">اكتشف جمال المملكة</p>
    </div>

    <div class="palm-row animate-fadeIn" style="animation-delay:0.6s">
      <span class="palm">🌴</span>
      <span class="star">✦</span>
      <span class="palm">🌴</span>
    </div>

    <div class="loading-dots animate-fadeIn" style="animation-delay:1.2s">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="splash-footer animate-fadeIn" style="animation-delay:1.5s">
    <p>هيئة الترفيه السياحية السعودية</p>
  </div>
</ion-content>
