<ion-header class="explore-header">
  <ion-toolbar>
    <ion-title class="page-title">استكشف المملكة</ion-title>
  </ion-toolbar>
  <ion-toolbar class="search-toolbar">
    <ion-searchbar
      placeholder="ابحث عن مدن، معالم، فنادق..."
      [value]="searchQuery"
      (ionInput)="onSearch($event)"
      animated
      class="explore-search">
    </ion-searchbar>
  </ion-toolbar>
  <div class="seg-strip">
    <div class="scroll-x seg-row">
      <button *ngFor="let seg of segments"
              class="seg-pill"
              [class.active]="activeSegment === seg.value"
              (click)="activeSegment = seg.value">
        <span class="seg-icon">{{ seg.icon }}</span>
        <span class="seg-lbl">{{ seg.label }}</span>
      </button>
    </div>
  </div>
</ion-header>

<ion-content class="explore-content">
  <ion-refresher slot="fixed" (ionRefresh)="refresh($event)">
    <ion-refresher-content pullingText="اسحب للتحديث" refreshingText="جاري التحديث..."></ion-refresher-content>
  </ion-refresher>

  <div class="results-bar" *ngIf="!isLoading">
    <span class="results-count">{{ activeCount }} نتيجة</span>
  </div>

  <!-- ─── Cities ──────────────────────────────────────────────────────────── -->
  <div *ngIf="activeSegment === 'cities'">
    <ng-container *ngIf="!isLoading; else skelLoading">
      <div class="cities-grid">
        <app-city-card *ngFor="let city of cities" [city]="city" variant="featured"></app-city-card>
      </div>
      <app-empty-state *ngIf="!hasResults" icon="map-outline" title="لا توجد مدن" message="جرّب كلمة بحث مختلفة"></app-empty-state>
    </ng-container>
  </div>

  <!-- ─── Attractions ──────────────────────────────────────────────────────── -->
  <div *ngIf="activeSegment === 'attractions'">
    <ng-container *ngIf="!isLoading; else skelLoading">
      <div class="scroll-x px-16">
        <app-attraction-card *ngFor="let attr of attractions" [attraction]="attr"></app-attraction-card>
      </div>
      <app-empty-state *ngIf="!hasResults" icon="compass-outline" title="لا توجد معالم" message="جرّب فئة مختلفة"></app-empty-state>
    </ng-container>
  </div>

  <!-- ─── Events ───────────────────────────────────────────────────────────── -->
  <div *ngIf="activeSegment === 'events'">
    <ng-container *ngIf="!isLoading; else skelLoading">
      <div class="events-list">
        <app-event-card *ngFor="let event of events" [event]="event" variant="list"></app-event-card>
      </div>
      <app-empty-state *ngIf="!hasResults" icon="calendar-outline" title="لا توجد فعاليات" message="لا توجد فعاليات متاحة"></app-empty-state>
    </ng-container>
  </div>

  <!-- ─── Hotels ───────────────────────────────────────────────────────────── -->
  <div *ngIf="activeSegment === 'hotels'">
    <ng-container *ngIf="!isLoading; else skelLoading">
      <div class="scroll-x px-16">
        <app-hotel-card *ngFor="let hotel of hotels" [hotel]="hotel"></app-hotel-card>
      </div>
      <app-empty-state *ngIf="!hasResults" icon="bed-outline" title="لا توجد فنادق" message="جرّب البحث بمدينة أخرى"></app-empty-state>
    </ng-container>
  </div>

  <!-- ─── Restaurants ──────────────────────────────────────────────────────── -->
  <div *ngIf="activeSegment === 'restaurants'">
    <ng-container *ngIf="!isLoading; else skelLoading">
      <div class="scroll-x px-16">
        <app-restaurant-card *ngFor="let rest of restaurants" [restaurant]="rest"></app-restaurant-card>
      </div>
      <app-empty-state *ngIf="!hasResults" icon="restaurant-outline" title="لا توجد مطاعم" message="جرّب البحث بمطبخ مختلف"></app-empty-state>
    </ng-container>
  </div>

  <ng-template #skelLoading>
    <div class="skel-wrap">
      <app-skeleton-card variant="city" [count]="4"></app-skeleton-card>
    </div>
  </ng-template>

  <div class="bottom-space"></div>
</ion-content>
